services:
  web:
    build: .
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      DJANGO_DEBUG: "0"
      DJANGO_ALLOWED_HOSTS: "*"
      DJANGO_SECRET_KEY: "${DJANGO_SECRET_KEY:-change-me-in-production}"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
